{% extends 'base.html' %}

{% block title %}Editar Agendamento{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Editar Sessão</h4>
            </div>
            <div class="card-body">
                <form action="/editar_agendamento/{{ agendamento['id'] }}" method="POST" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nome do Cliente</label>
                        <input type="text" name="cliente" class="form-control" value="{{ agendamento['nome_cliente'] }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">WhatsApp</label>
                        <input type="text" name="telefone" class="form-control" value="{{ agendamento['telefone'] }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Data e Hora</label>
                        <input type="datetime-local" name="data_hora" class="form-control" value="{{ agendamento['data_hora'] }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-select" required>
                            <option value="Pendente" {% if agendamento['status'] == 'Pendente' %}selected{% endif %}>Pendente</option>
                            <option value="Concluído" {% if agendamento['status'] == 'Concluído' %}selected{% endif %}>Concluído</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Descrição da Tatuagem</label>
                        <input type="text" name="descricao" class="form-control" value="{{ agendamento['descricao_tatuagem'] }}">
                    </div>
                    <div class="col-12 d-flex justify-content-between mt-4">
                        <a href="/agenda" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-dark">Salvar Alterações</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
