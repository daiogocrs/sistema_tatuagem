{% extends 'base.html' %}

{% block title %}Editar Material{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Editar Material</h4>
            </div>
            <div class="card-body">
                <form action="/editar_material/{{ item['id'] }}" method="POST" class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Nome do Material</label>
                        <input type="text" name="item" class="form-control" value="{{ item['nome_item'] }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Categoria</label>
                        <select name="categoria" class="form-select" required>
                            <option value="Agulhas" {% if item['categoria'] == 'Agulhas' %}selected{% endif %}>Agulhas</option>
                            <option value="Tintas" {% if item['categoria'] == 'Tintas' %}selected{% endif %}>Tintas</option>
                            <option value="Outros" {% if item['categoria'] == 'Outros' %}selected{% endif %}>Outros</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Quantidade</label>
                        <input type="number" name="quantidade" class="form-control" value="{{ item['quantidade'] }}" required>
                    </div>
                    <div class="col-12 d-flex justify-content-between mt-4">
                        <a href="/" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-dark">Salvar Alterações</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
